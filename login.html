<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Lauver.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          oklch(99% 0.007 75);
      --surface:     oklch(96% 0.015 72);
      --border:      oklch(90% 0.022 70);
      --orange:      oklch(63% 0.22 43);
      --orange-dark: oklch(29% 0.16 42);
      --yellow:      oklch(80% 0.19 80);
      --text:        oklch(16% 0.04 45);
      --text-mid:    oklch(40% 0.06 48);
      --text-light:  oklch(62% 0.04 50);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    /* ── LEFT BRAND PANEL ─────────────────────── */
    .brand-panel {
      flex: 0 0 42%;
      background: var(--orange-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }
    .brand-panel::before {
      content: '';
      position: absolute;
      width: 480px; height: 480px;
      border: 1.5px solid color-mix(in oklch, var(--yellow) 15%, transparent);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .brand-panel::after {
      content: '';
      position: absolute;
      width: 320px; height: 320px;
      border: 1px solid color-mix(in oklch, var(--orange) 25%, transparent);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .brand-logo {
      width: 160px;
      height: auto;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 8px 32px oklch(63% 0.22 43 / 0.4));
      animation: floatLogo 5s ease-in-out infinite;
    }
    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    .brand-headline {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 3rem;
      text-transform: uppercase;
      color: var(--bg);
      text-align: center;
      line-height: .95;
      margin-top: 2rem;
      position: relative;
      z-index: 2;
    }
    .brand-headline span { color: var(--yellow); display: block; }
    .brand-sub {
      color: oklch(72% 0.03 60);
      font-size: .88rem;
      text-align: center;
      margin-top: 1rem;
      max-width: 260px;
      line-height: 1.6;
      position: relative;
      z-index: 2;
    }
    .brand-pills {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      justify-content: center;
      margin-top: 2rem;
      max-width: 280px;
      position: relative;
      z-index: 2;
    }
    .brand-pill {
      background: color-mix(in oklch, var(--yellow) 12%, transparent);
      border: 1px solid color-mix(in oklch, var(--yellow) 22%, transparent);
      color: oklch(80% 0.04 68);
      font-size: .68rem;
      font-weight: 600;
      padding: .22rem .65rem;
      border-radius: 2rem;
      white-space: nowrap;
    }
    .back-link {
      position: absolute;
      top: 1.5rem; left: 1.5rem;
      color: oklch(65% 0.03 60);
      text-decoration: none;
      font-size: .8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: color .2s;
      z-index: 10;
    }
    .back-link:hover { color: var(--yellow); }

    /* ── RIGHT AUTH PANEL ─────────────────────── */
    .auth-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      background: radial-gradient(ellipse 80% 60% at 100% 0%,
        color-mix(in oklch, var(--yellow) 14%, transparent),
        transparent 70%);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
    }

    /* ── TABS ────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: .6rem;
      padding: .25rem;
      margin-bottom: 2rem;
      gap: .25rem;
    }
    .tab {
      flex: 1;
      padding: .6rem;
      border: none;
      background: transparent;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-mid);
      border-radius: .4rem;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .tab.active {
      background: var(--bg);
      color: var(--orange-dark);
      box-shadow: 0 1px 4px oklch(20% 0.08 45 / .1);
    }

    /* ── FORM HEAD ───────────────────────────── */
    .form-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2.2rem;
      color: var(--orange-dark);
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: .35rem;
    }
    .form-subtitle {
      font-size: .88rem;
      color: var(--text-mid);
      margin-bottom: 1.8rem;
    }

    /* ── GOOGLE BUTTON ───────────────────────── */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      padding: .85rem 1.2rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: .5rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .92rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
    }
    .btn-google:hover {
      border-color: color-mix(in oklch, var(--orange) 40%, transparent);
      box-shadow: 0 2px 12px oklch(63% 0.22 43 / .1);
    }
    .google-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    /* ── DIVIDER ─────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.4rem 0;
      color: var(--text-light);
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── FORM FIELDS ─────────────────────────── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      margin-bottom: 1rem;
    }
    .field-group label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-mid);
    }
    .field-group input {
      padding: .8rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: .45rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .9rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-group input::placeholder { color: var(--text-light); }
    .field-group input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--orange) 12%, transparent);
    }

    /* ── ERROR ───────────────────────────────── */
    .auth-error {
      display: none;
      background: color-mix(in oklch, oklch(55% 0.2 25) 10%, var(--bg));
      border: 1px solid color-mix(in oklch, oklch(55% 0.2 25) 30%, transparent);
      color: oklch(40% 0.18 25);
      font-size: .82rem;
      font-weight: 500;
      padding: .7rem 1rem;
      border-radius: .45rem;
      margin-bottom: 1rem;
    }

    /* ── SUBMIT ──────────────────────────────── */
    .btn-submit {
      width: 100%;
      padding: .9rem;
      background: var(--orange);
      color: var(--bg);
      border: none;
      border-radius: .5rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .15s;
      letter-spacing: .02em;
      margin-top: .25rem;
    }
    .btn-submit:hover { background: var(--orange-dark); transform: translateY(-1px); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ── SWITCH ──────────────────────────────── */
    .switch-row {
      text-align: center;
      margin-top: 1.4rem;
      font-size: .83rem;
      color: var(--text-mid);
    }
    .switch-row a {
      color: var(--orange);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .switch-row a:hover { text-decoration: underline; }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 720px) {
      .brand-panel { display: none; }
      .auth-panel { padding: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- ── LEFT: BRAND PANEL ─────────────────────── -->
<div class="brand-panel">
  <a href="/" class="back-link" data-i18n="login.brand.back">← Back to home</a>
  <img src="/lauver-logo.png" alt="Lauver.ai" class="brand-logo">
  <h1 class="brand-headline"><span data-i18n="login.brand.h1.1">Find Your</span><span data-i18n="login.brand.h1.2">Pack.</span></h1>
  <p class="brand-sub" data-i18n="login.brand.sub">Track activities, match with athletes, and build the community that keeps you going.</p>
  <div class="brand-pills">
    <span class="brand-pill" data-i18n="login.pill.run">🏃 Running</span>
    <span class="brand-pill" data-i18n="login.pill.cycle">🚴 Cycling</span>
    <span class="brand-pill" data-i18n="login.pill.climb">🧗 Climbing</span>
    <span class="brand-pill" data-i18n="login.pill.swim">🏊 Swimming</span>
    <span class="brand-pill" data-i18n="login.pill.hike">🥾 Hiking</span>
    <span class="brand-pill" data-i18n="login.pill.more">+45 more</span>
  </div>
</div>

<!-- ── RIGHT: AUTH PANEL ──────────────────────── -->
<div class="auth-panel">
  <div style="position:absolute;top:1.2rem;right:1.5rem;z-index:10">
    <button class="lang-toggle-btn" style="background:transparent;border:1.5px solid var(--border);color:var(--text-mid);padding:.4rem .85rem;border-radius:2rem;font-family:inherit;font-size:.75rem;font-weight:700;cursor:pointer;transition:border-color .2s,color .2s">中文</button>
  </div>
  <div class="auth-card">

    <div class="tabs">
      <button class="tab active" id="tab-signin" data-i18n="login.tab.in">Sign In</button>
      <button class="tab" id="tab-signup" data-i18n="login.tab.up">Create Account</button>
    </div>

    <h2 class="form-title" id="form-title">Welcome back</h2>
    <p class="form-subtitle" id="form-subtitle">Sign in to your Lauver account</p>

    <!-- Google -->
    <button class="btn-google" id="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span data-i18n="login.google">Continue with Google</span>
    </button>

    <div class="divider" data-i18n="login.divider">or continue with email</div>

    <div id="auth-error" class="auth-error"></div>

    <form id="auth-form" novalidate>
      <!-- Name (signup only) -->
      <div class="field-group" id="name-group" style="display:none">
        <label for="name" data-i18n="login.name.lbl">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" autocomplete="name" data-i18n-ph="login.name.ph">
      </div>

      <div class="field-group">
        <label for="email" data-i18n="login.email.lbl">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" data-i18n-ph="login.email.ph">
      </div>

      <div class="field-group">
        <label for="password" data-i18n="login.pass.lbl">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" data-i18n-ph="login.pass.ph">
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
    </form>

    <p class="switch-row">
      <span id="switch-text">Don't have an account? </span>
      <a id="switch-link">Sign up</a>
    </p>

  </div>
</div>

<script type="module">
  import { initI18n } from '/src/i18n.js';
  import '/src/login.js';
  initI18n();
</script>
</body>
</html>
